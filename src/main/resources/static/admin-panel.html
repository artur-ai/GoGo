<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - GoGo</title>
    <link rel="stylesheet" href="/admin.css">
</head>
<body>

<header>
    <div class="logo">GoGo Admin</div>
    <button id="logoutBtn" class="logout-btn">Logout</button>
</header>

<div class="admin-layout">
    <div class="form-container">
        <h2>Add New Car</h2>
        <form id="addCarForm" class="admin-form">
            <div class="form-group">
                <label>Brand *</label>
                <input type="text" id="brand" required>
            </div>
            <div class="form-group">
                <label>Model *</label>
                <input type="text" id="model" required>
            </div>
            <div class="form-group">
                <label>Year *</label>
                <input type="number" id="year" min="1990" max="2100" required>
            </div>
            <div class="form-group">
                <label>Fuel Type *</label>
                <select id="fuelType" required>
                    <option value="">Select fuel type</option>
                    <option value="Petrol">Petrol</option>
                    <option value="Diesel">Diesel</option>
                    <option value="Electric">Electric</option>
                    <option value="Hybrid">Hybrid</option>
                </select>
            </div>
            <div class="form-group">
                <label>Engine *</label>
                <input type="text" id="engine" placeholder="e.g., 2.0L" required>
            </div>
            <div class="form-group">
                <label>Price per Day ($) *</label>
                <input type="number" id="pricePerDay" min="0" step="0.01" required>
            </div>
            <div class="form-group">
                <label>Price per Minute ($) *</label>
                <input type="number" id="pricePerMinute" min="0" step="0.01" required>
            </div>
            <div class="form-group">
                <label>Insurance Price ($)</label>
                <input type="number" id="insurancePrice" min="0" step="0.01" value="0">
            </div>
            <div class="form-group">
                <label>Image URL</label>
                <input type="url" id="imageUrl" placeholder="https://...">
            </div>
            <button type="submit" class="btn-submit">Add Car</button>
        </form>
        <div id="message" class="message"></div>
    </div>

    <div class="cars-section">
        <h2>All Cars</h2>
        <div id="admin-car-list" class="admin-car-list">
            <p>Завантаження...</p>
        </div>
        <div class="pagination">
            <button id="prev-btn" disabled>← Назад</button>
            <span id="page-info">Сторінка 1</span>
            <button id="next-btn">Вперед →</button>
        </div>
    </div>
</div>

<script src="js/admin.js"></script>
</body>
</html>
