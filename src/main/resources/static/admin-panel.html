<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - GoGo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body>

<header>
    <div class="logo">GoGo</div>
    <button class="burger" id="burger">&#9776;</button>
    <nav id="nav-menu">
        <ul class="nav-links">
            <li><a href="/">Головна</a></li>
        </ul>

        <div id="user-nav" style="display: flex; gap: 15px; align-items: center;">
      <span style="color: black; font-weight: 500; font-size: 16px;">
        Вітаємо, <b id="user-name-display">Адмін</b>
      </span>
            <button onclick="logout()" class="cta-button" style="padding: 8px 15px; font-size: 14px;">Вийти</button>
        </div>
    </nav>
</header>

<main class="admin-main">
    <div class="admin-container">
        <div class="form-container">
            <h2>Додати нове авто</h2>
            <form id="addCarForm" class="admin-form">
                <div class="form-group">
                    <label>Марка *</label>
                    <input type="text" id="brand" required>
                </div>
                <div class="form-group">
                    <label>Модель *</label>
                    <input type="text" id="model" required>
                </div>
                <div class="form-group">
                    <label>Рік *</label>
                    <input type="number" id="year" min="1990" max="2100" required>
                </div>
                <div class="form-group">
                    <label>Тип палива *</label>
                    <select id="fuelType" required>
                        <option value="">Вибери тип</option>
                        <option value="Petrol">Бензин</option>
                        <option value="Diesel">Дизель</option>
                        <option value="Electric">Електро</option>
                        <option value="Hybrid">Гібрид</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Двигун *</label>
                    <input type="text" id="engine" placeholder="напр., 2.0L" required>
                </div>
                <div class="form-group">
                    <label>Ціна за день ($) *</label>
                    <input type="number" id="pricePerDay" min="0" step="0.01" required>
                </div>
                <div class="form-group">
                    <label>Ціна за хвилину ($) *</label>
                    <input type="number" id="pricePerMinute" min="0" step="0.01" required>
                </div>
                <div class="form-group">
                    <label>Страховка ($)</label>
                    <input type="number" id="insurancePrice" min="0" step="0.01" value="0">
                </div>
                <div class="form-group">
                    <label>URL фото</label>
                    <input type="url" id="imageUrl" placeholder="https://...">
                </div>
                <button type="submit" class="cta-button">Додати авто</button>
            </form>
            <div id="message" class="message"></div>
        </div>
    </div>
</main>

<script src="js/admin.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
